{% extends "core/base.html" %}
{% block title %}Log in — cloak{% endblock %}
{% block content %}
<h1>Log in</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn">Log in</button>
</form>
<p>No account? <a href="{% url 'signup' %}">Sign up</a>.</p>
{% endblock %}
