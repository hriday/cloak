{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}cloak{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'core/favicon.svg' %}">
  <link rel="stylesheet" href="{% static 'core/style.css' %}?v={% now 'U' %}">
  <script defer src="{% static 'vendor/htmx.min.js' %}"></script>
  <script defer src="{% static 'core/wizard.js' %}?v={% now 'U' %}"></script>
  <script defer src="{% static 'vendor/alpine.min.js' %}"></script>
  <script>
    window.CLOAK_LOGGED_IN = {{ user.is_authenticated|yesno:'true,false' }};
    window.CLOAK_ASSETS_VERSION = "{% now 'U' %}";
  </script>
  <script defer src="{% static 'core/import-on-login.js' %}?v={% now 'U' %}"></script>
</head>
<body>
  <header class="site">
    <a href="{% url 'landing' %}" style="display:inline-flex;align-items:center;"><img src="{% static 'core/logo.svg' %}" alt="cloak" style="height:28px;display:block;"></a>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}">{{ user.email|default:user.username }}</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline">
          {% csrf_token %}
          <button class="btn secondary" type="submit">Log out</button>
        </form>
      {% else %}
        <a class="btn secondary" href="{% url 'login' %}">Log in</a>
        <a class="btn" href="{% url 'signup' %}">Sign up</a>
      {% endif %}
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
