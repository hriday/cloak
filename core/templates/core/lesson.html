{% extends "core/base.html" %}
{% load static %}
{% block title %}{{ algorithm.name }} — {{ lesson.title }}{% endblock %}
{% block content %}
{{ initial_data|json_script:"cloak-init-data" }}

<div x-data="wizardComponent(JSON.parse(document.getElementById('cloak-init-data').textContent))" x-init="init()">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <h2 style="margin:0">{{ algorithm.name }} — {{ lesson.title }}</h2>
    <button class="btn secondary" @click="showFullScript()">Show full script</button>
  </div>

  <div class="progress">
    <template x-for="(state, idx) in progressBar" :key="idx">
      <div :class="state"></div>
    </template>
  </div>

  <template x-for="step in steps" :key="step.order">
    <div x-show="step.order === currentStepOrder" class="card">
      <div x-html="substituteState(step.prompt_html)"></div>

      <template x-if="step.help_html">
        <details class="help" open>
          <summary>In plain English</summary>
          <div x-html="substituteState(step.help_html)"></div>
        </details>
      </template>

      <template x-if="step.kind === 'input-numeric'">
        <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <input type="text" x-model="inputValue" placeholder="your answer" @keydown.enter="check()">
          <button class="btn" @click="check()">Check</button>
          <button x-show="hasWalkthrough()" class="btn secondary" @click="showWalkthrough()" x-text="walkthroughLabel()"></button>
        </div>
      </template>

      <template x-if="step.kind === 'input-multi'">
        <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span>p =</span><input type="text" x-model="multiInput.p" style="min-width:90px">
          <span>q =</span><input type="text" x-model="multiInput.q" style="min-width:90px">
          <button class="btn" @click="check()">Check</button>
          <button x-show="hasWalkthrough()" class="btn secondary" @click="showWalkthrough()" x-text="walkthroughLabel()"></button>
        </div>
      </template>

      <template x-if="step.kind === 'input-text'">
        <div style="margin-top:12px;">
          <textarea
            x-model="sentenceInput"
            placeholder="Type your sentence (max 500 ASCII chars)"
            maxlength="500"
            rows="3"
            style="width:100%;font-family:inherit;padding:8px;"
            @input="$nextTick(() => {})"></textarea>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
            <span style="color:var(--muted);font-size:0.8em;" x-text="`${sentenceInput.length} / 500`"></span>
            <div>
              <button class="btn" @click="check()">Continue</button>
              <button x-show="hasWalkthrough()" class="btn secondary" @click="showWalkthrough()" x-text="walkthroughLabel()"></button>
            </div>
          </div>
        </div>
      </template>

      <template x-if="step.kind === 'choose-from-list'">
        <div style="margin-top:12px;">
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            <template x-for="opt in coprimeOptions" :key="opt">
              <button class="btn secondary" @click="inputValue = String(opt); check()" x-text="opt"></button>
            </template>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <span style="color:var(--muted);font-size:0.85em;" x-show="coprimeOptions.length > 0">Or type one:</span>
            <span style="color:var(--muted);font-size:0.85em;" x-show="coprimeOptions.length === 0">No quick picks available — type a value yourself:</span>
            <input type="text" x-model="inputValue" placeholder="e" @keydown.enter="check()" style="min-width:90px">
            <button class="btn" @click="check()">Check</button>
            <button x-show="hasWalkthrough()" class="btn secondary" @click="showWalkthrough()" x-text="walkthroughLabel()"></button>
          </div>
        </div>
      </template>

      <template x-if="step.kind === 'info'">
        <div style="margin-top:12px;">

          <!-- Soft-done fork: toy lesson complete -->
          <template x-if="step.slug === 'toy-complete'">
            <div>
              <div style="margin-bottom:16px;">
                <div style="color:var(--muted);font-size:0.8em;margin-bottom:4px;">Your toy lesson script</div>
                <pre class="code" style="max-height:240px;overflow:auto;" x-text="fullScript"></pre>
              </div>
              <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <button class="btn" @click="advance()">Encrypt a real sentence →</button>
                <a href="/" class="btn secondary">Back to algorithms</a>
                <a href="/dashboard/" class="btn secondary">My progress</a>
              </div>
            </div>
          </template>

          <!-- Final done + playground -->
          <template x-if="step.slug === 'done'">
            <div>
              <div style="margin-bottom:16px;">
                <div style="color:var(--muted);font-size:0.8em;margin-bottom:4px;">Your full Python script</div>
                <pre class="code" style="max-height:320px;overflow:auto;" x-text="fullScript"></pre>
              </div>

              <div style="margin-bottom:16px;border-top:1px dashed var(--border, #ddd);padding-top:12px;">
                <h3 style="margin:0 0 6px 0;">Playground</h3>
                <p style="color:var(--muted);margin:0 0 8px 0;font-size:0.9em;">Type anything (≤500 printable ASCII chars). The table re-encrypts as you type, using <span x-text="`n=${state.n2}, e=${state.e2}, d=${state.d2}`"></span>.</p>
                <textarea
                  x-model="playgroundSentence"
                  @input="recomputePlayground()"
                  placeholder="Try a sentence..."
                  maxlength="500"
                  rows="3"
                  style="width:100%;font-family:inherit;padding:8px;"></textarea>
                <div style="color:var(--muted);font-size:0.8em;margin-top:4px;">
                  <span x-text="`${playgroundSentence.length} / 500`"></span>
                  · decoded: <code x-text="playgroundDecoded || '—'"></code>
                </div>
              </div>

              <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <a href="/" class="btn">Back to algorithms</a>
                <a href="/dashboard/" class="btn secondary">My progress</a>
              </div>
            </div>
          </template>

          <!-- Decrypt-sentence info step: actually decrypt state.encrypted and show -->
          <template x-if="step.slug === 'decrypt-sentence'">
            <div>
              <p style="color:var(--muted);">Each encrypted number gets <code>^d mod n</code> applied. The result is the original ASCII code, which decodes back to the character. Recovered text (computed from <code>state.encrypted</code> with d=<span x-text="state.d2"></span>, n=<span x-text="state.n2"></span>):</p>
              <pre class="code" x-text="recoveredText"></pre>
              <p x-show="recoveredMatchesOriginal" style="color:var(--ok, #2a8a3e);">✓ Matches the original sentence.</p>
              <p x-show="!recoveredMatchesOriginal" style="color:var(--err, #c0392b);">⚠ Does not match the original — key derivation bug. Please reload.</p>
              <button class="btn" @click="advance()">Continue</button>
            </div>
          </template>

          <!-- Continue button on all other info steps -->
          <template x-if="step.slug !== 'done' && step.slug !== 'toy-complete' && step.slug !== 'decrypt-sentence'">
            <button class="btn" @click="advance()" x-text="isLast ? 'Done' : 'Continue'"></button>
          </template>
        </div>
      </template>

      <div x-show="hint" x-text="hint" class="hint"></div>

      <div x-show="walkthroughHtml" class="hint" style="margin-top:10px;line-height:1.5;" x-html="walkthroughHtml"></div>

      <template x-if="conversionRows.length > 0 && (step.kind === 'input-text' || step.slug === 'encrypt-sentence' || step.slug === 'decrypt-sentence' || step.slug === 'done')">
        <div style="margin-top:14px;max-height:300px;overflow:auto;border:1px solid var(--border, #ddd);border-radius:4px;">
          <table style="width:100%;border-collapse:collapse;font-family:monospace;font-size:0.9em;">
            <thead style="position:sticky;top:0;background:var(--bg, #fff);">
              <tr>
                <th style="text-align:left;padding:6px 10px;">char</th>
                <th style="text-align:left;padding:6px 10px;">binary</th>
                <th style="text-align:right;padding:6px 10px;">ascii</th>
                <th style="text-align:right;padding:6px 10px;" x-show="conversionRows.some(r => r.enc !== null)">encrypted</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(row, i) in conversionRows" :key="i">
                <tr>
                  <td style="padding:4px 10px;" x-text="row.ch === ' ' ? '␣' : row.ch"></td>
                  <td style="padding:4px 10px;" x-text="row.bin"></td>
                  <td style="padding:4px 10px;text-align:right;" x-text="row.code"></td>
                  <td style="padding:4px 10px;text-align:right;" x-text="row.enc !== null ? row.enc : ''" x-show="conversionRows.some(r => r.enc !== null)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>

      <div x-show="inlineCode" style="margin-top:14px;">
        <div style="color:var(--muted);font-size:0.8em;margin-bottom:4px;">Python for this step</div>
        <div class="code" x-text="inlineCode"></div>
      </div>
    </div>
  </template>

  <div style="display:flex;justify-content:space-between;margin-top:8px;">
    <button class="btn secondary" @click="back()" :disabled="currentStepOrder === 1">← Back</button>
    <span style="color:var(--muted)" x-text="`Step ${currentStepOrder} of ${displayedStepTotal}`"></span>
  </div>

  <template x-if="!{{ user.is_authenticated|yesno:'true,false' }} && currentStepOrder >= 3">
    <div class="banner">
      Save your progress: <a href="{% url 'signup' %}" style="color:#fff;text-decoration:underline">sign up</a> or
      <a href="{% url 'login' %}" style="color:#fff;text-decoration:underline">log in</a>.
    </div>
  </template>

  <div class="modal-bg" x-show="fullScriptOpen" @click.self="fullScriptOpen = false">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0">{{ algorithm.slug }}_lesson.py</h3>
        <div>
          <button class="btn secondary" @click="copyFullScript()">Copy</button>
          <button class="btn" @click="downloadFullScript()">Download</button>
          <button class="btn secondary" @click="fullScriptOpen = false">Close</button>
        </div>
      </div>
      <pre class="code" style="margin-top:12px;" x-text="fullScript"></pre>
    </div>
  </div>
</div>
{% endblock %}
